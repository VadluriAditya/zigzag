<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZigZag — Free Endless Dodge Game</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <h1>ZigZag</h1>
    <p class="sub">Three lanes. Tap or use arrow keys to dodge. Speed climbs the longer you last.</p>
    <canvas id="game" width="360" height="640"></canvas>
    <p class="hint">Click a lane to move · Space/Enter to retry after Game Over</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
